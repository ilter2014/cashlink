<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CashLink | Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 20px;
        }
        h2 {
            color: #38bdf8;
            font-size: 28px;
        }
        .logout-btn {
            background-color: #f87171;
            color: #0f172a;
            padding: 8px 16px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .logout-btn:hover {
            opacity: 0.9;
        }
        .card {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card h3 {
            margin-bottom: 15px;
            color: #94a3b8;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .balance {
            font-size: 36px;
            color: #4ade80;
            font-weight: bold;
        }
        .form-group {
            display: flex;
            gap: 15px;
        }
        input[type="url"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            background-color: #0f172a;
            border: 1px solid #475569;
            color: #ffffff;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="url"]:focus {
            border-color: #38bdf8;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            font-size: 16px;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #7dd3fc;
        }
        #form-status {
            margin-top: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        .table-container {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            background-color: #0f172a;
            color: #38bdf8;
            font-weight: 600;
        }
        td {
            color: #cbd5e1;
            font-size: 15px;
        }
        .link-url {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 500;
        }
        .link-url:hover {
            text-decoration: underline;
        }
        .target-text {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>CashLink Yönetim Paneli</h2>
            <a href="/login" class="logout-btn" onclick="document.cookie = 'sb_user_id=; Max-Age=0; path=/;';">Çıkış Yap</a>
        </div>
        
        <!-- Bakiye Kartı -->
        <div class="card">
            <h3>Güncel Bakiyeniz</h3>
            <div class="balance" id="user-balance">0.00 TL</div>
        </div>

        <!-- Link Kısaltma Kartı -->
        <div class="card">
            <h3>Yeni Otomatik Link Kısalt</h3>
            <form id="link-form" class="form-group">
                <input type="url" id="target-url" placeholder="Kısaltmak istediğiniz URL'yi yapıştırın (https://...)" required>
                <button type="submit">Link Oluştur</button>
            </form>
            <p id="form-status"></p>
        </div>

        <!-- Link Listesi Kartı -->
        <div class="card">
            <h3>Kısalttığınız Linkler</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Özel Kod</th>
                            <th>Hedef URL</th>
                            <th>CashLink Bağlantısı</th>
                        </tr>
                    </thead>
                    <tbody id="links-table">
                        <!-- Veriler API'den dinamik olarak yüklenecek -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde kullanıcı verilerini ve linkleri getirir
        async function loadDashboard() {
            const res = await fetch('/api/link?action=get_data');
            
            // Eğer oturum açılmadıysa login sayfasına postala
            if (res.status === 401) {
                window.location.href = '/login';
                return;
            }
            
            const data = await res.json();
            
            // Bakiyeyi güncelle
            document.getElementById('user-balance').innerText = `${Number(data.balance).toLocaleString('tr-TR', { minimumFractionDigits: 2 })} TL`;
            
            // Tabloyu doldur
            const tbody = document.getElementById('links-table');
            tbody.innerHTML = '';
            
            if (data.links.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #64748b;">Henüz kısaltılmış bir linkiniz bulunmuyor.</td></tr>`;
                return;
            }

            data.links.forEach(link => {
                const fullUrl = `${window.location.origin}/${link.code}`;
                tbody.innerHTML += `
                    <tr>
                        <td><code style="background: #0f172a; padding: 4px 8px; border-radius: 4px; color: #e2e8f0;">${link.code}</code></td>
                        <td><span class="target-text" title="${link.target_url}">${link.target_url}</span></td>
                        <td><a href="${fullUrl}" target="_blank" class="link-url">${fullUrl}</a></td>
                    </tr>
                `;
            });
        }

        // Form gönderme olayı (Yeni otomatik link kısaltma)
        document.getElementById('link-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const target_url = document.getElementById('target-url').value;
            const status = document.getElementById('form-status');

            status.innerText = "⏳ 6 haneli benzersiz kod üretiliyor...";
            status.style.color = "#38bdf8";

            const res = await fetch('/api/link?action=create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_url })
            });

            if (res.ok) {
                status.innerText = "🚀 6 Haneli sistem kodunuz başarıyla oluşturuldu ve listeye eklendi!";
                status.style.color = "#4ade80";
                document.getElementById('target-url').value = ''; // Input alanını temizle
                loadDashboard(); // Tabloyu yenile
            } else {
                const txt = await res.text();
                status.innerText = `❌ Hata: ${txt}`;
                status.style.color = "#f87171";
            }
        });

        // Sayfa açıldığında ilk yüklemeyi tetikle
        loadDashboard();
    </script>
</body>
</html>
