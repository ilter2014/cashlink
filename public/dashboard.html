<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CashLink | Panel</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background-color: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 20px; }
        .balance { font-size: 32px; color: #4ade80; font-weight: bold; }
        input, button { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #475569; }
        input { background: #0f172a; color: white; width: 60%; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; font-weight: bold; border: none; cursor: pointer; width: 35%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background-color: #0f172a; color: #38bdf8; }
        a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>CashLink Dashboard</h2>
        
        <div class="card">
            <h3>Güncel Bakiyeniz</h3>
            <div class="balance" id="user-balance">0.00 TL</div>
        </div>

        <div class="card">
            <h3>Yeni Link Kısalt</h3>
            <form id="link-form">
                <input type="url" id="target-url" placeholder="Kısaltılacak URL (https://...)" required>
                <input type="text" id="custom-code" placeholder="Özel Kod (Örn: hediye)" required style="width: 20%; margin-left: 2%;">
                <button type="submit">Kısalt ve Paylaş</button>
            </form>
            <p id="form-status" style="margin-top: 10px; font-weight: bold;"></p>
        </div>

        <div class="card">
            <h3>Kısalttığınız Linkler</h3>
            <table>
                <thead>
                    <tr>
                        <th>Özel Kod</th>
                        <th>Hedef URL</th>
                        <th>CashLink Bağlantısı</th>
                    </tr>
                </thead>
                <tbody id="links-table">
                    <!-- Dinamik olarak dolacak -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Sayfa yüklendiğinde verileri çek
        async function loadDashboard() {
            const res = await fetch('/api/link?action=get_data');
            if (res.status === 401) {
                window.location.href = '/login';
                return;
            }
            const data = await res.json();
            
            document.getElementById('user-balance').innerText = `${data.balance} TL`;
            
            const tbody = document.getElementById('links-table');
            tbody.innerHTML = '';
            
            data.links.forEach(link => {
                const fullUrl = `${window.location.origin}/${link.code}`;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${link.code}</strong></td>
                        <td><small>${link.target_url}</small></td>
                        <td><a href="${fullUrl}" target="_blank">${fullUrl}</a></td>
                    </tr>
                `;
            });
        }

        // Link Kısaltma Formu
        document.getElementById('link-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const target_url = document.getElementById('target-url').value;
            const code = document.getElementById('custom-code').value;
            const status = document.getElementById('form-status');

            const res = await fetch('/api/link?action=create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_url, code })
            });

            if (res.ok) {
                status.innerText = "🚀 Link başarıyla oluşturuldu!";
                status.style.color = "#4ade80";
                loadDashboard();
            } else {
                const txt = await res.text();
                status.innerText = `❌ Hata: ${txt}`;
                status.style.color = "#f87171";
            }
        });

        loadDashboard();
    </script>
</body>
</html>
