<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CashLink | Güvenli Bağlantı</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .header-banner { background-color: #1e293b; border: 1px solid #38bdf8; padding: 15px 30px; border-radius: 8px; font-weight: bold; margin-bottom: 40px; }
        .counter-box { font-size: 24px; text-align: center; }
        #countdown { font-size: 48px; color: #38bdf8; font-weight: bold; margin-top: 10px; }
        .status { margin-top: 20px; font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="header-banner">⚠️ Bu site DataDev tarafından korunmakta ve desteklenmektedir.</div>
    <div class="counter-box">Güvenli bağlantı kuruluyor, lütfen bekleyin...<div id="countdown">5</div></div>
    <div class="status" id="status-text">Kullanıcı doğrulaması yapılıyor...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('target');
        const earnStatus = urlParams.get('earn');
        const balance = urlParams.get('balance');
        let timeLeft = 5;
        
        const countdownElement = document.getElementById('countdown');
        const statusElement = document.getElementById('status-text');

        if(earnStatus === 'success') {
            statusElement.innerText = `💰 Hesabınıza 100 TL eklendi! Güncel Bakiye: ${balance} TL. Yönlendiriliyorsunuz...`;
            statusElement.style.color = "#4ade80";
        } else if(earnStatus === 'cooldown') {
            statusElement.innerText = `❌ Son 30 dakika içinde zaten ödül aldınız! Güncel Bakiye: ${balance} TL. Ödül alınamadı.`;
            statusElement.style.color = "#f87171";
        }

        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                if (targetUrl) {
                    window.location.href = decodeURIComponent(targetUrl);
                } else {
                    statusElement.innerText = "Hata: Geçersiz yönlendirme kodu.";
                }
            }
        }, 1000);
    </script>
</body>
</html>
