<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>CashLink - Giriş Yap</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-box { background-color: #1e293b; padding: 30px; border-radius: 8px; border: 1px solid #38bdf8; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; background: #0f172a; border: 1px solid #475569; color: white; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .links { margin-top: 15px; font-size: 14px; }
        a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>CashLink Giriş</h2>
        <form action="/api/auth?action=login" method="POST">
            <input type="email" name="email" placeholder="E-posta Adresi" required>
            <input type="password" name="password" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
        <div class="links"><a href="/register">Hesabın yok mu? Kayıt Ol</a></div>
    </div>
</body>
</html>
